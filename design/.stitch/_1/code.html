<body class="text-text-main font-sans min-h-screen flex flex-col" style="background-color: #f0f2f5;">
<!-- BEGIN: TopHeader -->
<header class="items-center px-6 py-4 bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-50 flex justify-between gap-4"><div class="flex items-center gap-4">
<h1 class="text-xl font-bold text-gray-800 mr-4">任务管理</h1>
<div class="flex items-center bg-gray-200/60 p-1 rounded-full shadow-inner">
<button class="px-6 py-1.5 text-sm rounded-full bg-white text-text-main shadow-sm font-medium transition-all">状态</button>
<button class="px-6 py-1.5 text-sm rounded-full text-text-muted hover:text-text-main transition-all">优先级</button>
</div>
</div>
<div class="flex flex-1 justify-center max-w-md mx-4">
<div class="relative flex items-center group w-full"><span class="absolute left-4 text-gray-400 group-focus-within:text-primary transition-colors"><i class="fas fa-search text-sm"></i></span><input class="pl-10 pr-24 py-2 text-sm bg-white border border-gray-200 rounded-full w-full focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all placeholder:text-text-muted" placeholder="搜索任务标题或描述" type="text"><button class="absolute right-1 px-4 py-1.5 bg-primary text-white text-xs font-bold rounded-full hover:bg-opacity-90 transition-all shadow-sm">搜索</button></div>
</div>
<div class="flex items-center gap-3"><button class="px-5 py-2 text-sm border border-primary text-primary font-medium flex items-center gap-2 hover:bg-primary/5 transition-colors rounded-full whitespace-nowrap"><i class="fas fa-filter"></i> 筛选</button><button class="px-12 py-2 text-sm bg-primary text-white font-bold flex items-center justify-center gap-2 hover:bg-opacity-90 transition-all shadow-md rounded-full whitespace-nowrap"><i class="fas fa-plus"></i> 新建任务</button><button class="w-9 h-9 rounded-full overflow-hidden border-2 border-white shadow-sm hover:border-primary hover:shadow-md transition-all flex-shrink-0 bg-gray-100 flex items-center justify-center group">

</button></div></header>
<!-- END: TopHeader -->
<!-- BEGIN: KanbanBoard -->
<main class="flex-1 overflow-x-auto p-6 px-10 pb-12 no-scrollbar flex items-start space-x-10">

<div class="w-96 flex-shrink-0 rounded-[24px] p-5 flex flex-col max-h-full shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white/40 backdrop-blur-sm bg-amber-50/50">
<div class="flex justify-between items-center mb-4 px-2">
<div class="flex items-center gap-2">
<i class="fas fa-clipboard-list text-amber-500"></i>

</div>
<span class="text-xs bg-gray-100 text-gray-600 px-2.5 py-1 rounded-full">3</span>
<button class="w-6 h-6 rounded-full bg-white border border-gray-200 flex items-center justify-center text-text-muted hover:text-primary hover:border-primary transition-all"><i class="fas fa-plus text-[10px]"></i></button></div>
<div class="flex-1 overflow-y-auto no-scrollbar space-y-4 bg-black/5 rounded-2xl p-3 shadow-inner">
<!-- Task Card 1 -->
<div class="bg-card-bg rounded-2xl p-6 relative group flex flex-col border border-transparent hover:border-gray-100 transition-all shadow-xl">
<div class="flex justify-between items-start mb-4">

<div class="flex gap-1 text-text-muted opacity-60 group-hover:opacity-100 transition-opacity">
<button class="hover:text-primary p-1.5 rounded-full hover:bg-gray-100"><i class="far fa-check-circle"></i></button>
<button class="hover:text-primary p-1.5 rounded-full hover:bg-gray-100"><i class="fas fa-pencil-alt"></i></button>
<button class="hover:text-red-500 p-1.5 rounded-full hover:bg-gray-100"><i class="far fa-trash-alt"></i></button>
</div>
</div>
<p class="text-sm text-text-muted/80 mb-6 line-clamp-2 leading-relaxed">规划并执行生产环境 MySQL 数据库向云服务端的整体迁移与优化。</p>
<div class="flex items-center justify-between mt-auto pt-4 border-t border-gray-50">
<div class="flex items-center gap-3">
<span class="inline-flex items-center px-2.5 py-1 rounded-full text-[10px] font-bold bg-red-100 text-red-600 uppercase tracking-wider">
<i class="fas fa-circle text-[6px] mr-1.5"></i>高优先
      </span>
</div>
<div class="flex items-center text-text-muted gap-1.5">
<i class="far fa-calendar-alt text-[10px]"></i>
<span class="text-[11px] font-medium">10-25</span>
</div>
</div>
</div>
<!-- Task Card 2 -->
<div class="bg-card-bg rounded-2xl p-6 relative group flex flex-col border border-transparent hover:border-gray-100 transition-all shadow-xl">

<div class="flex gap-1 text-text-muted opacity-60 group-hover:opacity-100 transition-opacity">

<button class="hover:text-primary p-1.5 rounded-full hover:bg-gray-100"><i class="fas fa-pencil-alt"></i></button>
<button class="hover:text-red-500 p-1.5 rounded-full hover:bg-gray-100"><i class="far fa-trash-alt"></i></button>
</div>
</div>
<p class="text-sm text-text-muted/80 mb-6 line-clamp-2 leading-relaxed">完成 2.0 版本的核心功能操作指南，包含截图与常见问题解答。</p>
<div class="flex items-center justify-between mt-auto pt-4 border-t border-gray-50">
<div class="flex items-center gap-3">
<span class="inline-flex items-center px-2.5 py-1 rounded-full text-[10px] font-bold bg-orange-100 text-orange-600 uppercase tracking-wider">
<i class="fas fa-circle text-[6px] mr-1.5"></i>中优先
      </span>
</div>
<div class="flex items-center text-text-muted gap-1.5">
<i class="far fa-calendar-alt text-[10px]"></i>
<span class="text-[11px] font-medium">11-02</span>

</div>
</div>
</div>

<button class="w-6 h-6 rounded-full bg-white border border-gray-200 flex items-center justify-center text-text-muted hover:text-primary hover:border-primary transition-all"><i class="fas fa-plus text-[10px]"></i></button></div>
<div class="flex-1 overflow-y-auto no-scrollbar space-y-4 bg-black/5 rounded-2xl p-3 shadow-inner">

<button class="hover:text-primary p-1.5 rounded-full hover:bg-gray-100"><i class="fas fa-pencil-alt"></i></button>
<button class="hover:text-red-500 p-1.5 rounded-full hover:bg-gray-100"><i class="far fa-trash-alt"></i></button>
</div>

<span class="inline-flex items-center px-2.5 py-1 rounded-full text-[10px] font-bold bg-red-100 text-red-600 uppercase tracking-wider">
<i class="fas fa-circle text-[6px] mr-1.5"></i>高优先
      </span>
</div>

</div>

<button class="w-6 h-6 rounded-full bg-white border border-gray-200 flex items-center justify-center text-text-muted hover:text-primary hover:border-primary transition-all"><i class="fas fa-plus text-[10px]"></i></button></div>
<div class="flex-1 overflow-y-auto no-scrollbar space-y-4 bg-black/5 rounded-2xl p-3 shadow-inner">

<button class="hover:text-red-500 p-1.5 rounded-full hover:bg-gray-100"><i class="far fa-trash-alt"></i></button>

<div class="flex items-center justify-between mt-auto pt-4 border-t border-gray-50">
<div class="flex items-center gap-3">
<span class="inline-flex items-center px-2.5 py-1 rounded-full text-[10px] font-bold bg-gray-100 text-gray-600 uppercase tracking-wider">
<i class="fas fa-circle text-[6px] mr-1.5"></i>低优先

<div class="flex items-center text-green-600 gap-1.5">
