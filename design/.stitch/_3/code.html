<!DOCTYPE html><html lang="zh-CN" style=""><head><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>任务管理 - 看板视图</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'app-bg': '#f8f7f2',
            'card-bg': '#ffffff',
            'primary': '#00bfa5',
            'text-main': '#333333',
            'text-muted': '#888888',
            'border-light': '#eeeeee',
            'tag-blue-bg': '#e6f4ff',
            'tag-blue-text': '#0958d9',
            'tag-orange-bg': '#fff2e8',
            'tag-orange-text': '#d4380d',
            'column-bg': '#f3f2ed',
          },
          borderRadius: {
            'xl': '12px',
            '2xl': '16px',
          },
          boxShadow: {
            'card': '0 4px 16px rgba(0,0,0,0.03)',
          }
        }
      }
    }
  </script>
<style data-purpose="custom-scrollbars">
    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
  </style>
</head>
<body class="text-text-main font-sans min-h-screen flex flex-col" style="background-color: #f0f2f5;">
<!-- BEGIN: TopHeader -->
<header class="items-center px-6 py-4 bg-white shadow-sm sticky top-0 z-50 flex justify-between gap-4"><div class="flex items-center gap-4">
<h1 class="text-xl font-bold text-gray-800 mr-4">任务管理</h1>
<div class="flex items-center bg-gray-200/60 p-1 rounded-full shadow-inner">
<button class="px-6 py-1.5 text-sm rounded-full text-text-muted hover:text-text-main transition-all">状态</button>
<button class="px-6 py-1.5 text-sm rounded-full bg-white text-text-main shadow-sm font-medium transition-all">优先级</button>
</div>
</div>
<div class="flex flex-1 justify-center max-w-md mx-4">
<div class="relative flex items-center group w-full"><span class="absolute left-4 text-gray-400 group-focus-within:text-primary transition-colors"><i class="fas fa-search text-sm"></i></span><input class="pl-10 pr-20 py-2 text-sm bg-white border border-gray-200 rounded-full w-full focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all placeholder:text-text-muted" placeholder="搜索任务标题或描述" type="text"><button class="absolute right-1.5 px-4 py-1 text-sm bg-primary text-white font-medium rounded-full hover:bg-opacity-90 transition-all shadow-sm">搜索</button></div>
</div>
<div class="flex items-center gap-3">
<button class="px-5 py-2 text-sm border border-primary text-primary font-medium flex items-center gap-2 hover:bg-primary/5 transition-colors rounded-full whitespace-nowrap">
<i class="fas fa-filter"></i> 筛选
  </button>
<button class="px-12 py-2 text-sm bg-primary text-white font-bold flex items-center justify-center gap-2 hover:bg-opacity-90 transition-all shadow-md rounded-full whitespace-nowrap">
<i class="fas fa-plus"></i> 新建任务
  </button>
<button class="w-9 h-9 rounded-full overflow-hidden border border-gray-200 hover:border-primary transition-all flex-shrink-0 shadow-sm bg-gray-50 flex items-center justify-center group">
<div class="w-full h-full flex items-center justify-center text-gray-400 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">account_circle</span>
</div>
</button><div class="absolute right-6 top-16 w-48 bg-white rounded-2xl shadow-xl border border-gray-50 py-2 z-50 flex flex-col">
<button class="flex items-center gap-3 px-4 py-2.5 text-sm text-text-main hover:bg-gray-100 transition-colors">
<span class="material-symbols-outlined text-gray-500 text-[20px]">settings</span>
<span>数据设置</span>
</button>
<button class="flex items-center gap-3 px-4 py-2.5 text-sm text-red-600 hover:bg-gray-100 transition-colors">
<span class="material-symbols-outlined text-red-500 text-[20px]">logout</span>
<span>退出登录</span>
</button>
</div></div></header>
<!-- END: TopHeader -->
<!-- BEGIN: MainToolbar -->
<!-- END: MainToolbar -->
<!-- BEGIN: KanbanBoard -->
<main class="flex-1 overflow-x-auto p-6 no-scrollbar flex items-start space-x-10 px-10 pb-12"><!-- Column: 高优先级 (High Priority) -->
<div class="w-96 flex-shrink-0 bg-red-50/50 rounded-[24px] p-5 flex flex-col max-h-full shadow-xl">
<div class="flex justify-between items-center mb-4 px-2">
<div class="flex items-center gap-2">
<i class="fas fa-circle-exclamation text-red-500"></i>
<h2 class="font-bold text-lg text-text-main">高优先级</h2>
</div>
<span class="text-xs bg-red-100 text-red-600 px-2.5 py-1 rounded-full">2</span>
<button class="w-6 h-6 rounded-full bg-white border border-gray-200 flex items-center justify-center text-text-muted hover:text-primary hover:border-primary transition-all"><i class="fas fa-plus text-[10px]"></i></button>
</div>
<div class="flex-1 overflow-y-auto no-scrollbar space-y-4 bg-black/5 rounded-2xl p-3 shadow-inner">
<!-- Task Card: 数据库迁移方案 -->
<div class="bg-card-bg rounded-2xl p-6 relative group flex flex-col border border-transparent hover:border-gray-100 transition-all shadow-xl">
<div class="flex justify-between items-start mb-4">
<h3 class="font-bold text-lg text-text-main leading-tight">数据库迁移方案</h3>
<div class="flex gap-1 text-text-muted opacity-60 group-hover:opacity-100 transition-opacity">
<button class="hover:text-primary p-1.5 rounded-full hover:bg-gray-100"><i class="far fa-check-circle"></i></button>
<button class="hover:text-primary p-1.5 rounded-full hover:bg-gray-100"><i class="fas fa-pencil-alt"></i></button>
<button class="hover:text-red-500 p-1.5 rounded-full hover:bg-gray-100"><i class="far fa-trash-alt"></i></button>
</div>
</div>
<p class="text-sm text-text-muted/80 mb-6 line-clamp-2 leading-relaxed">规划并执行生产环境 MySQL 数据库向云服务端的整体迁移与优化。</p>
<div class="flex items-center justify-between mt-auto pt-4 border-t border-gray-50">
<div class="flex items-center gap-3">
<span class="inline-flex items-center px-2.5 py-1 rounded-full text-[10px] font-bold bg-red-100 text-red-600 uppercase tracking-wider">
<i class="fas fa-circle text-[6px] mr-1.5"></i>高优先
      </span>
</div>
<div class="flex items-center text-text-muted gap-1.5">
<i class="far fa-calendar-alt text-[10px]"></i>
<span class="text-[11px] font-medium">10-25</span>
</div>
</div>
</div>
<!-- Task Card: 核心 API 重构 -->
<div class="bg-card-bg rounded-2xl p-6 relative group flex flex-col border border-transparent hover:border-gray-100 transition-all shadow-xl">
<div class="flex justify-between items-start mb-4">
<h3 class="font-bold text-lg text-text-main leading-tight">核心 API 重构</h3>
<div class="flex gap-1 text-text-muted opacity-60 group-hover:opacity-100 transition-opacity">
<button class="hover:text-primary p-1.5 rounded-full hover:bg-gray-100"><i class="far fa-check-circle"></i></button>
<button class="hover:text-primary p-1.5 rounded-full hover:bg-gray-100"><i class="fas fa-pencil-alt"></i></button>
<button class="hover:text-red-500 p-1.5 rounded-full hover:bg-gray-100"><i class="far fa-trash-alt"></i></button>
</div>
</div>
<p class="text-sm text-text-muted/80 mb-6 line-clamp-2 leading-relaxed">正在优化鉴权模块与数据流响应速度，目前完成度 60%。</p>
<div class="flex items-center justify-between mt-auto pt-4 border-t border-gray-50">
<div class="flex items-center gap-3">
<span class="inline-flex items-center px-2.5 py-1 rounded-full text-[10px] font-bold bg-red-100 text-red-600 uppercase tracking-wider">
<i class="fas fa-circle text-[6px] mr-1.5"></i>高优先
      </span>
</div>
<div class="flex items-center text-text-muted gap-1.5">
<i class="fas fa-spinner fa-spin text-[10px]"></i>
<span class="text-[11px] font-medium">进行中</span>
</div>
</div>
</div>
</div>
</div>
<!-- Column: 中优先级 (Medium Priority) -->
<div class="w-96 flex-shrink-0 bg-amber-50/50 rounded-[24px] p-5 flex flex-col max-h-full shadow-xl">
<div class="flex justify-between items-center mb-4 px-2">
<div class="flex items-center gap-2">
<i class="fas fa-circle-dot text-orange-400"></i>
<h2 class="font-bold text-lg text-text-main">中优先级</h2>
</div>
<span class="text-xs bg-orange-100 text-orange-600 px-2.5 py-1 rounded-full">1</span>
<button class="w-6 h-6 rounded-full bg-white border border-gray-200 flex items-center justify-center text-text-muted hover:text-primary hover:border-primary transition-all"><i class="fas fa-plus text-[10px]"></i></button>
</div>
<div class="flex-1 overflow-y-auto no-scrollbar space-y-4 bg-black/5 rounded-2xl p-3 shadow-inner">
<!-- Task Card: 用户手册编写 -->
<div class="bg-card-bg rounded-2xl p-6 relative group flex flex-col border border-transparent hover:border-gray-100 transition-all shadow-xl">
<div class="flex justify-between items-start mb-4">
<h3 class="font-bold text-lg text-text-main leading-tight">用户手册编写</h3>
<div class="flex gap-1 text-text-muted opacity-60 group-hover:opacity-100 transition-opacity">
<button class="hover:text-primary p-1.5 rounded-full hover:bg-gray-100"><i class="far fa-check-circle"></i></button>
<button class="hover:text-primary p-1.5 rounded-full hover:bg-gray-100"><i class="fas fa-pencil-alt"></i></button>
<button class="hover:text-red-500 p-1.5 rounded-full hover:bg-gray-100"><i class="far fa-trash-alt"></i></button>
</div>
</div>
<p class="text-sm text-text-muted/80 mb-6 line-clamp-2 leading-relaxed">完成 2.0 版本的核心功能操作指南，包含截图与常见问题解答。</p>
<div class="flex items-center justify-between mt-auto pt-4 border-t border-gray-50">
<div class="flex items-center gap-3">
<span class="inline-flex items-center px-2.5 py-1 rounded-full text-[10px] font-bold bg-orange-100 text-orange-600 uppercase tracking-wider">
<i class="fas fa-circle text-[6px] mr-1.5"></i>中优先
      </span>
</div>
<div class="flex items-center text-text-muted gap-1.5">
<i class="far fa-calendar-alt text-[10px]"></i>
<span class="text-[11px] font-medium">11-02</span>
</div>
</div>
</div>
</div>
</div>
<!-- Column: 低优先级 (Low Priority) -->
<div class="w-96 flex-shrink-0 bg-emerald-50/50 rounded-[24px] p-5 flex flex-col max-h-full shadow-xl">
<div class="flex justify-between items-center mb-4 px-2">
<div class="flex items-center gap-2">
<i class="fas fa-circle-check text-green-500"></i>
<h2 class="font-bold text-lg text-text-main">低优先级</h2>
</div>
<span class="text-xs bg-green-100 text-green-600 px-2.5 py-1 rounded-full">1</span>
<button class="w-6 h-6 rounded-full bg-white border border-gray-200 flex items-center justify-center text-text-muted hover:text-primary hover:border-primary transition-all"><i class="fas fa-plus text-[10px]"></i></button>
</div>
<div class="flex-1 overflow-y-auto no-scrollbar space-y-4 bg-black/5 rounded-2xl p-3 shadow-inner">
<!-- Task Card: 图标库更新 -->
<div class="bg-card-bg rounded-2xl p-6 relative group flex flex-col opacity-80 border border-transparent hover:border-gray-100 transition-all shadow-xl">
<div class="flex justify-between items-start mb-4">
<h3 class="font-bold text-lg text-gray-500 line-through leading-tight">图标库更新</h3>
<div class="flex gap-1 text-text-muted opacity-60 group-hover:opacity-100 transition-opacity">
<button class="text-green-500 p-1.5 rounded-full hover:bg-gray-100"><i class="far fa-check-circle"></i></button>
<button class="hover:text-primary p-1.5 rounded-full hover:bg-gray-100"><i class="fas fa-pencil-alt"></i></button>
<button class="hover:text-red-500 p-1.5 rounded-full hover:bg-gray-100"><i class="far fa-trash-alt"></i></button>
</div>
</div>
<p class="text-sm text-text-muted/80 mb-6 line-clamp-2 leading-relaxed">同步了最新的 Material Design 图标到前端资源目录。</p>
<div class="flex items-center justify-between mt-auto pt-4 border-t border-gray-50">
<div class="flex items-center gap-3">
<span class="inline-flex items-center px-2.5 py-1 rounded-full text-[10px] font-bold bg-gray-100 text-gray-600 uppercase tracking-wider">
<i class="fas fa-circle text-[6px] mr-1.5"></i>低优先
      </span>
</div>
<div class="flex items-center text-green-600 gap-1.5">
<i class="fas fa-check text-[10px]"></i>
<span class="text-[11px] font-medium">10-15</span>
</div>
</div>
</div>
</div>
</div></main>
<!-- END: KanbanBoard -->

</body></html>
