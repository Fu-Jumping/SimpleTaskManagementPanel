<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .soft-shadow {
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);

<body class="bg-surface-container-low min-h-screen flex items-center justify-center font-body-md text-on-surface p-container-padding antialiased">
<!-- Registration Card -->
<main class="glass-panel w-full max-w-[480px] rounded-lg soft-shadow p-card-padding md:p-container-padding flex flex-col gap-[32px]">
<!-- Header -->
<header class="text-center flex flex-col gap-element-gap-md items-center">
<div class="w-[48px] h-[48px] bg-primary-container rounded-full flex items-center justify-center text-on-primary-container mb-2">
<span class="material-symbols-outlined" style="font-size: 28px;">view_kanban</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tight">创建新账号</h1>

</header>
<!-- Form -->
<form action="#" class="flex flex-col gap-[20px]" method="POST">
<!-- Username Input -->
<div class="relative flex items-center bg-surface rounded-full input-focus-ring transition-all duration-200">
<span class="material-symbols-outlined text-outline pl-4 absolute pointer-events-none">person</span>
<input class="w-full bg-transparent border-none py-3 pl-12 pr-4 rounded-full font-body-sm text-body-sm text-on-surface placeholder-outline focus:ring-0" placeholder="用户名" required="" type="text">
</div>
<!-- Email Input -->

<!-- Password Input -->
<div class="relative flex items-center bg-surface rounded-full input-focus-ring transition-all duration-200">
<span class="material-symbols-outlined text-outline pl-4 absolute pointer-events-none">lock</span>
<input class="w-full bg-transparent border-none py-3 pl-12 pr-4 rounded-full font-body-sm text-body-sm text-on-surface placeholder-outline focus:ring-0" placeholder="密码" required="" type="password">
</div>
<!-- Confirm Password Input -->
<div class="relative flex items-center bg-surface rounded-full input-focus-ring transition-all duration-200">
<span class="material-symbols-outlined text-outline pl-4 absolute pointer-events-none">lock_reset</span>
<input class="w-full bg-transparent border-none py-3 pl-12 pr-4 rounded-full font-body-sm text-body-sm text-on-surface placeholder-outline focus:ring-0" placeholder="确认密码" required="" type="password">
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-body-md text-body-md py-3 rounded-full hover:bg-surface-tint transition-colors duration-200 mt-4 shadow-[0_4px_16px_rgba(0,107,92,0.2)] hover:shadow-[0_6px_20px_rgba(0,107,92,0.3)]" type="submit">
                注册
            </button>
</form>
<!-- Footer Link -->
<div class="text-center mt-2">
<span class="font-body-sm text-body-sm text-text-muted">已有账号？</span>
<a class="font-body-sm text-body-sm text-primary font-semibold hover:underline ml-1" href="#">立即登录</a>
</div>
</main>
