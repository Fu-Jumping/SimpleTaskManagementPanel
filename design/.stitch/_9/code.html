<body class="bg-app-bg text-on-background font-body-md min-h-screen relative overflow-hidden">
<!-- Mock Background Content (Kanban Board) -->
<div class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-container-padding h-16 shadow-sm dark:shadow-none bg-surface-container-lowest">
<div class="flex items-center space-x-container-padding">
<span class="text-headline-md font-headline-md font-bold text-primary dark:text-inverse-primary">ZenKanban</span>
<div class="hidden md:flex space-x-element-gap-md">
<a class="text-on-surface-variant dark:text-surface-variant hover:text-primary font-body-md text-body-md py-4" href="#">仪表盘</a>
<a class="text-on-surface-variant dark:text-surface-variant hover:text-primary font-body-md text-body-md py-4" href="#">我的任务</a>
<a class="text-primary dark:text-inverse-primary font-bold border-b-2 border-primary pb-1 font-body-md text-body-md py-4" href="#">团队协作</a>
<a class="text-on-surface-variant dark:text-surface-variant hover:text-primary font-body-md text-body-md py-4" href="#">项目库</a>
</div>
</div>
<div class="flex items-center space-x-element-gap-md">
<button class="text-on-surface-variant hover:text-primary transition-colors p-2 rounded-full hover:bg-surface-container-low" data-icon="notifications">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-colors p-2 rounded-full hover:bg-surface-container-low" data-icon="settings">
<span class="material-symbols-outlined">settings</span>
</button>
<button class="bg-primary text-on-primary font-label-md text-label-md px-6 py-2 rounded-full hover:opacity-90 transition-opacity">新建任务</button>
<img alt="用户头像" class="w-8 h-8 rounded-full border border-border-light object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBdozAfnjO90Tvhb5TIwwVNl9Zp7Ik0s55Bhl2Nrz-xZWgNMIvpXvCCnnTNtslaWlHLfFVBoQgRw2rS_eybBp-qwK5lympofk_Ry5vgHP_a133HhArXsWCwEVw17TNxvr4SZs1Ok9iDtwtXMr8TPRx1NoLZFb079KE6T0nvjFlB5Xu5-aW5M7bKVCWagY5RUpyCDbovizFQV12j3RuBZ_MbDXLVdYPiPQ8kRjfnEtqetPF9npxPkKk_OEvLaH-jrthxDSubhDZssRE">
</div>
</div>
<!-- Backdrop & Modal Container -->
<div class="fixed inset-0 z-[60] bg-on-surface/30 backdrop-blur-sm flex items-center justify-center p-4">
<!-- Modal -->
<div class="bg-surface-container-lowest w-full max-w-2xl rounded-lg modal-shadow flex flex-col max-h-[921px]">
<!-- Modal Header -->
<div class="flex items-center justify-between p-6 border-surface-variant">
<h2 class="font-headline-lg text-headline-lg text-on-surface">新建任务</h2>
<button aria-label="关闭" class="text-on-surface-variant hover:text-primary hover:bg-surface-container-low p-2 rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Body (Scrollable) -->
<div class="p-6 overflow-y-auto space-y-6 flex-1">
<!-- Task Title -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="task-title">任务标题</label>
<input class="w-full bg-surface-container-low border border-outline-variant text-on-surface rounded-full px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent font-body-md text-body-md placeholder-text-muted transition-shadow" id="task-title" placeholder="输入任务名称..." type="text">
</div>
<!-- Detailed Description -->
<div><label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="task-desc">任务描述</label>
<textarea class="w-full bg-surface-container-low border border-outline-variant text-on-surface rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent font-body-sm text-body-sm placeholder-text-muted transition-shadow resize-none" id="task-desc" placeholder="输入任务描述..." rows="4"></textarea></div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Due Date -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2">截止日期</label>
<div class="relative"><div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant"><span class="material-symbols-outlined">calendar_month</span></div>
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant"><span class="material-symbols-outlined">calendar_month</span></div>
<input class="w-full bg-surface-container-low text-on-surface rounded-full pl-12 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent font-body-md text-body-md cursor-pointer hover:bg-surface-container-highest transition-colors border-0" placeholder="选择日期" readonly="" type="text" value="2023-10-24">
</div>
</div>
<!-- Priority -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2">优先级</label>
<div class="flex bg-surface-container-low p-1 rounded-full w-fit h-[50px] items-center">
<button class="h-full px-6 rounded-full font-label-md text-label-md bg-surface-container-lowest text-primary shadow-sm flex items-center space-x-1">
<span class="w-2 h-2 rounded-full bg-primary-container"></span>
<span class="">中等</span>
</button>
<button class="h-full px-6 rounded-full font-label-md text-label-md text-on-surface-variant hover:text-on-surface hover:bg-surface-container-highest transition-colors flex items-center space-x-1">
<span class="w-2 h-2 rounded-full bg-error"></span>
<span class="">高</span>
</button>
<button class="h-full px-6 rounded-full font-label-md text-label-md text-on-surface-variant hover:text-on-surface hover:bg-surface-container-highest transition-colors flex items-center space-x-1">
<span class="w-2 h-2 rounded-full bg-outline"></span>
<span class="">低</span>
</button>
</div>
</div>
</div>
</div>
<!-- Modal Footer -->
<div class="p-6 border-surface-variant flex justify-end items-center space-x-4 bg-surface-bright rounded-b-lg">
<button class="px-6 py-2.5 rounded-full font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-highest transition-colors">
                    取消
                </button>
<button class="px-8 py-2.5 rounded-full font-label-md text-label-md bg-primary text-on-primary shadow-sm hover:opacity-90 transition-opacity flex items-center space-x-2">
<span class="material-symbols-outlined" style="font-size: 18px;">save</span>
<span class="">保存任务</span>
</button>
</div>
</div>
</div>
